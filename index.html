<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d9488">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Brain Relieve</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1e293b;
    --muted: #94a3b8;
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --card-light: #fdf6e3;
    --card-light-border: #f0e0b8;
    --card-dark: #1e293b;
    --danger: #b91c1c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
  }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ---------- Main screen ---------- */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 8px 4px 16px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  #count { font-size: 13px; color: var(--muted); }

  .inputrow {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #fff;
    border: 1.5px solid #e2e8f0;
    border-radius: 18px;
    padding: 10px 10px 10px 16px;
    box-shadow: 0 2px 8px rgba(30,41,59,0.05);
  }
  .inputrow:focus-within { border-color: var(--teal); }
  #dumpInput {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font: inherit;
    font-size: 17px;
    line-height: 1.35;
    max-height: 120px;
    background: transparent;
    color: var(--ink);
  }
  .iconbtn {
    flex: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .iconbtn:active { transform: scale(0.92); }
  #micBtn {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom) + 122px);
    width: 84px;
    height: 84px;
    border-radius: 50%;
    border: none;
    background: var(--teal);
    color: #fff;
    font-size: 38px;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(13,148,136,0.45);
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #micBtn:active { transform: translateX(-50%) scale(0.93); }
  #micBtn.listening {
    background: var(--danger);
    box-shadow: 0 10px 28px rgba(185,28,28,0.45);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(185,28,28,0.5), 0 10px 28px rgba(185,28,28,0.45); }
    50% { box-shadow: 0 0 0 22px rgba(185,28,28,0), 0 10px 28px rgba(185,28,28,0.45); }
  }
  #sendBtn { background: #e2e8f0; color: #94a3b8; }
  #sendBtn.ready { background: var(--teal); color: #fff; }

  #dumpFlash {
    text-align: center;
    font-size: 13px;
    color: var(--teal-dark);
    height: 20px;
    margin-bottom: 4px;
    opacity: 0;
    transition: opacity .3s;
  }
  #dumpFlash.show { opacity: 1; }

  .fivehead {
    margin: 26px 4px 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .fivehead h2 { font-size: 15px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; }
  .fivehead span { font-size: 12px; color: var(--muted); }

  .card {
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 16px;
    line-height: 1.4;
    word-break: break-word;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card .txt { flex: 1; }
  .donebtn {
    flex: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    background: transparent;
    color: inherit;
    opacity: 0.4;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .donebtn:active { opacity: 1; transform: scale(0.9); }
  .backuprow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    padding: 8px 2px 0;
  }
  .backuprow span { flex: 1; }
  .backuprow button {
    border: 1px solid #e2e8f0;
    background: #fff;
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 12px;
    color: #475569;
    cursor: pointer;
  }
  #undoToast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 116px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    border-radius: 12px;
    padding: 11px 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    font-size: 14px;
    box-shadow: 0 8px 24px rgba(30,41,59,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    z-index: 10;
    white-space: nowrap;
  }
  #undoToast.show { opacity: 1; pointer-events: auto; }
  #undoToast button {
    background: transparent;
    border: none;
    color: #5eead4;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
  }
  .card.dark {
    background: var(--card-dark);
    color: #f8fafc;
    font-weight: 600;
    box-shadow: 0 6px 16px rgba(30,41,59,0.35);
  }
  .card.light {
    background: var(--card-light);
    border: 1px solid var(--card-light-border);
    color: #57534e;
    box-shadow: 0 1px 3px rgba(30,41,59,0.06);
  }
  .card.guest {
    background: #fffbeb;
    border: 1.5px dashed #f5c56b;
    color: #92400e;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card.guest .txt { flex: 1; }
  .card.guest .left { flex: none; font-size: 11px; color: #b45309; white-space: nowrap; }
  .guesthead {
    margin: 18px 4px 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .guesthead h2 { font-size: 13px; font-weight: 700; color: #b45309; text-transform: uppercase; letter-spacing: 0.06em; }
  .guesthead span { font-size: 12px; color: var(--muted); }
  #fiveEmpty {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 24px 12px;
    line-height: 1.5;
  }

  #openArchiveBtn {
    border: 1px solid #e2e8f0;
    background: #fff;
    color: #475569;
    font: inherit;
    font-size: 14px;
    padding: 11px 17px;
    border-radius: 999px;
    cursor: pointer;
  }
  .version { font-size: 11px; color: #cbd5e1; }
  #mainScreen { padding-bottom: 235px; }
  .dock {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    width: 100%;
    max-width: 480px;
    background: var(--bg);
    padding: 6px 16px calc(env(safe-area-inset-bottom) + 12px);
    z-index: 4;
  }

  /* ---------- Lock screen ---------- */
  #lockScreen { align-items: center; justify-content: center; text-align: center; }
  #lockScreen .lockicon { font-size: 44px; margin-bottom: 16px; }
  #lockScreen p { color: #475569; margin-bottom: 20px; font-size: 15px; }
  #pwInput {
    font-size: 24px;
    letter-spacing: 0.4em;
    text-align: center;
    width: 180px;
    padding: 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    outline: none;
    background: #fff;
  }
  #pwInput.wrong { border-color: var(--danger); animation: shake .4s; }
  #lockScreen .back { margin-top: 28px; }

  /* ---------- Archive screen ---------- */
  #archiveScreen header h1 { font-size: 18px; }
  #archList { flex: 1; overflow-y: auto; padding-bottom: 12px; }
  .arch {
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 14px;
    padding: 13px 15px;
    margin-bottom: 8px;
    font-size: 15px;
    line-height: 1.35;
    background: #fff;
    border: 1px solid #eee8dd;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity .4s, background .15s;
  }
  .arch .txt { flex: 1; word-break: break-word; }
  .arch .age { flex: none; font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
  .arch.light { background: var(--card-light); border-color: var(--card-light-border); }
  .arch.dark {
    background: var(--card-dark);
    border-color: var(--card-dark);
    color: #f8fafc;
    font-weight: 600;
    box-shadow: 0 5px 14px rgba(30,41,59,0.3);
  }
  .arch.dark .age { color: #94a3b8; }
  .arch.guest { background: #fffbeb; border: 1.5px dashed #f5c56b; color: #92400e; }
  .arch.guest .age { color: #b45309; }
  .arch.blocked { animation: shake .4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-7px); }
    40%,80% { transform: translateX(7px); }
  }
  #limitMsg {
    text-align: center;
    font-size: 13px;
    color: var(--danger);
    height: 18px;
    margin-bottom: 6px;
    opacity: 0;
    transition: opacity .3s;
  }
  #limitMsg.show { opacity: 1; }
  #archEmpty { color: var(--muted); text-align: center; padding: 40px 12px; font-size: 14px; }

  .bigbtn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: var(--ink);
    color: #fff;
    margin-top: 10px;
  }
  .ghost {
    background: transparent;
    color: var(--muted);
    border: none;
    font: inherit;
    font-size: 14px;
    padding: 10px;
    cursor: pointer;
  }
  #modal {
    position: fixed;
    inset: 0;
    background: rgba(30,41,59,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 20;
  }
  #modal[hidden] { display: none; }
  .modalcard {
    background: #fff;
    border-radius: 18px;
    padding: 22px 20px 14px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 18px 48px rgba(30,41,59,0.35);
  }
  .modalcard h3 { font-size: 17px; margin-bottom: 8px; }
  .modalcard p { font-size: 14px; color: #475569; line-height: 1.5; }
  .modalcard .bigbtn { margin-top: 16px; }
  .modalcard .ghost { width: 100%; margin-top: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- Main: my five on top, thumb dock at the bottom -->
  <section id="mainScreen" class="screen active">
    <header>
      <div>
        <h1>Brain Relieve</h1>
        <div class="version">v11</div>
      </div>
      <button id="openArchiveBtn">🔒 <span id="count">Archive</span></button>
    </header>

    <div class="fivehead">
      <h2>My Five</h2>
      <span id="fiveCount"></span>
    </div>
    <div id="fiveList"></div>
    <div id="fiveEmpty" hidden>Nothing prioritized yet.<br>Open the archive to pick up to five things.</div>

    <div class="guesthead" id="guestHead" hidden>
      <h2>Guests</h2>
      <span>expire on their own</span>
    </div>
    <div id="guestList"></div>

    <div class="dock">
      <div id="dumpFlash">Into the archive. Gone.</div>
      <div class="inputrow">
        <textarea id="dumpInput" rows="1" placeholder="What's on your mind?"></textarea>
        <button id="sendBtn" class="iconbtn" title="Send">➤</button>
      </div>
    </div>
    <button id="micBtn" title="Speak">🎤</button>
  </section>

  <div id="undoToast">
    <span>Done. Gone.</span>
    <button id="undoBtn">Undo</button>
  </div>

  <div id="modal" hidden>
    <div class="modalcard">
      <h3 id="modalTitle"></h3>
      <p id="modalText"></p>
      <button id="modalOk" class="bigbtn"></button>
      <button id="modalCancel" class="ghost">Cancel</button>
    </div>
  </div>

  <!-- Lock -->
  <section id="lockScreen" class="screen">
    <div class="lockicon">🔒</div>
    <p>The archive costs effort.<br>That's the point.</p>
    <input id="pwInput" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">
    <button class="ghost back" id="lockBackBtn">Back</button>
  </section>

  <!-- Archive -->
  <section id="archiveScreen" class="screen">
    <header>
      <h1>Archive</h1>
      <span id="archCount"></span>
    </header>
    <div id="limitMsg">Five is five. Remove one first.</div>
    <div id="archList"></div>
    <div id="archEmpty" hidden>Empty. Go dump.</div>
    <div class="backuprow">
      <span id="backupHint"></span>
      <button id="backupBtn">💾 Save backup</button>
      <button id="restoreBtn">Restore</button>
      <input id="restoreFile" type="file" accept="application/json,.json" hidden>
    </div>
    <button class="bigbtn" id="closeBtn">Lock it</button>
  </section>

</div>
<script>
(() => {
  'use strict';
  const DAY = 86400000;
  const EXPIRE_DAYS = 30;
  const FADE_START_DAYS = 20;
  const MAX_MARKS = 5;
  const GUEST_DAYS = 3;    // temporary overflow slots expire on their own
  const MAX_GUESTS = 3;
  const PASSWORD = '1234';
  const STORE_KEY = 'braindump.v1';

  // ---------- state ----------
  // {id, text, created, priority: null|'light'|'dark', guest: null|timestamp, guestUsed: bool}
  let items = [];
  const $ = id => document.getElementById(id);

  // Guest status pauses deletion but never resets the clock.
  function purgeReal() {
    const now = Date.now();
    let changed = false;
    for (const it of items) {
      if (it.guest && (now - it.guest) >= GUEST_DAYS * DAY) { it.guest = null; changed = true; }
    }
    const before = items.length;
    items = items.filter(it => it.priority || it.guest || (now - it.created) < EXPIRE_DAYS * DAY);
    if (items.length !== before) changed = true;
    if (changed) save();
    return changed;
  }
  function load() {
    try { items = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
    catch (e) { items = []; }
    purgeReal();
    save();
  }
  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(items));
    mirror();
  }

  // ---------- second copy in IndexedDB: auto-restore if localStorage is wiped ----------
  let idb = null;
  function mirror() {
    if (!idb) return;
    try { idb.transaction('kv', 'readwrite').objectStore('kv').put(JSON.parse(JSON.stringify(items)), 'items'); }
    catch (e) { /* mirror is best-effort */ }
  }
  function openMirror() {
    if (!window.indexedDB) return;
    const req = indexedDB.open('brainrelieve', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('kv');
    req.onsuccess = () => {
      idb = req.result;
      if (items.length === 0) {
        const get = idb.transaction('kv').objectStore('kv').get('items');
        get.onsuccess = () => {
          if (Array.isArray(get.result) && get.result.length) {
            items = get.result;
            purgeReal();
            localStorage.setItem(STORE_KEY, JSON.stringify(items));
            renderMain();
            flash('Restored from backup copy.');
          }
        };
      } else {
        mirror();
      }
    };
  }
  const age = it => Date.now() - it.created;
  const isGuest = it => !!it.guest && (Date.now() - it.guest) < GUEST_DAYS * DAY;
  const expired = it => !it.priority && !isGuest(it) && age(it) >= EXPIRE_DAYS * DAY;
  const marks = () => items.filter(it => it.priority).length;
  const guests = () => items.filter(isGuest);
  const guestDaysLeft = it => Math.max(1, Math.ceil((it.guest + GUEST_DAYS * DAY - Date.now()) / DAY));
  const guestOpacity = it => Math.max(0.35, 1 - 0.65 * ((Date.now() - it.guest) / (GUEST_DAYS * DAY)));

  // full strength until day 20, then a visible fade-out ticking down to day 30
  function fadeOpacity(it) {
    if (it.priority) return 1;
    const d = age(it) / DAY;
    if (d < FADE_START_DAYS) return 1;
    const t = (d - FADE_START_DAYS) / (EXPIRE_DAYS - FADE_START_DAYS);
    return Math.max(0.12, 1 - 0.88 * t);
  }
  function ageLabel(it) {
    const d = Math.floor(age(it) / DAY);
    const left = EXPIRE_DAYS - d;
    if (it.priority) return d === 0 ? 'today' : `${d} d ago`;
    if (d >= FADE_START_DAYS) return `expires in ${Math.max(left, 0)} d`;
    return d === 0 ? 'today' : `${d} d ago`;
  }

  // ---------- screens ----------
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  // ---------- main screen ----------
  function renderMain() {
    $('count').textContent = items.length ? `${items.length} in archive` : 'Archive';
    const five = items.filter(it => it.priority)
      .sort((a, b) => (a.priority === b.priority) ? b.created - a.created : (a.priority === 'dark' ? -1 : 1));
    const list = $('fiveList');
    list.innerHTML = '';
    for (const it of five) {
      const el = document.createElement('div');
      el.className = 'card ' + it.priority;
      const txt = document.createElement('div');
      txt.className = 'txt';
      txt.textContent = it.text;
      el.append(txt, doneBtn(it));
      // tap flips the weight (light <-> dark); removal stays behind the archive ritual or the check
      el.addEventListener('click', () => {
        it.priority = it.priority === 'dark' ? 'light' : 'dark';
        save();
        renderMain();
      });
      attachLongPress(el, it);
      list.appendChild(el);
    }
    $('fiveEmpty').hidden = five.length > 0;
    $('fiveCount').textContent = five.length ? `${five.length} / ${MAX_MARKS}` : '';

    const gs = guests().sort((a, b) => a.guest - b.guest);
    const glist = $('guestList');
    glist.innerHTML = '';
    for (const it of gs) {
      const el = document.createElement('div');
      el.className = 'card guest';
      el.style.opacity = guestOpacity(it);
      const txt = document.createElement('div');
      txt.className = 'txt';
      txt.textContent = it.text;
      const left = document.createElement('div');
      left.className = 'left';
      left.textContent = `${guestDaysLeft(it)} d left`;
      el.append(txt, left, doneBtn(it));
      attachLongPress(el, it);
      glist.appendChild(el);
    }
    $('guestHead').hidden = gs.length === 0;
  }

  const input = $('dumpInput');
  const sendBtn = $('sendBtn');
  input.addEventListener('input', () => {
    sendBtn.classList.toggle('ready', input.value.trim().length > 0);
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); dump(); }
  });
  sendBtn.addEventListener('click', dump);

  let flashTimer;
  function addThoughts(texts) {
    const now = Date.now();
    // reverse so the first line ends up on top
    texts.slice().reverse().forEach(t => {
      items.unshift({ id: now + '' + Math.random().toString(36).slice(2, 6), text: t, created: now, priority: null });
    });
    save();
  }
  function flash(msg) {
    const f = $('dumpFlash');
    f.textContent = msg;
    f.classList.add('show');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => f.classList.remove('show'), 1800);
  }
  function dump() {
    // one thought per line — pasting a list dumps each line separately
    const lines = input.value.split('\n').map(t => t.trim()).filter(Boolean);
    if (!lines.length) return;
    addThoughts(lines);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.classList.remove('ready');
    renderMain();
    flash(lines.length > 1 ? `${lines.length} thoughts archived.` : 'Into the archive. Gone.');
  }

  // ---------- voice ----------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = $('micBtn');
  if (!SR) {
    micBtn.style.display = 'none';
  } else {
    let rec = null, listening = false, baseText = '';
    micBtn.addEventListener('click', () => {
      if (listening) { rec.stop(); return; }
      rec = new SR();
      rec.lang = navigator.language || 'en-US';
      rec.interimResults = true;
      rec.continuous = false;
      baseText = input.value ? input.value.trim() + ' ' : '';
      rec.onstart = () => { listening = true; micBtn.classList.add('listening'); };
      rec.onresult = e => {
        let txt = '';
        for (const r of e.results) txt += r[0].transcript;
        input.value = baseText + txt;
        input.dispatchEvent(new Event('input'));
      };
      rec.onerror = () => stopUI();
      rec.onend = () => stopUI();
      function stopUI() {
        listening = false;
        micBtn.classList.remove('listening');
        input.focus();
      }
      try { rec.start(); } catch (e) { /* already running */ }
    });
  }

  // ---------- lock ----------
  $('openArchiveBtn').addEventListener('click', () => {
    $('pwInput').value = '';
    show('lockScreen');
    setTimeout(() => $('pwInput').focus(), 50);
  });
  $('lockBackBtn').addEventListener('click', () => show('mainScreen'));
  $('pwInput').addEventListener('input', e => {
    const el = e.target;
    if (el.value === PASSWORD) {
      el.classList.remove('wrong');
      renderArchive();
      show('archiveScreen');
    } else if (el.value.length >= PASSWORD.length) {
      el.classList.add('wrong');
      setTimeout(() => { el.classList.remove('wrong'); el.value = ''; }, 450);
    }
  });

  // ---------- archive ----------
  function renderArchive() {
    const list = $('archList');
    list.innerHTML = '';
    const visible = items.filter(it => !expired(it));
    for (const it of visible.slice().sort((a, b) => b.created - a.created)) {
      const el = document.createElement('div');
      el.className = 'arch' + (it.priority ? ' ' + it.priority : (isGuest(it) ? ' guest' : ''));
      el.style.opacity = isGuest(it) ? guestOpacity(it) : fadeOpacity(it);
      el.dataset.id = it.id;
      const txt = document.createElement('div');
      txt.className = 'txt';
      txt.textContent = it.text;
      const ag = document.createElement('div');
      ag.className = 'age';
      ag.textContent = isGuest(it) ? `guest · ${guestDaysLeft(it)} d left` : ageLabel(it);
      el.append(txt, ag, doneBtn(it));
      attachTap(el, it);
      list.appendChild(el);
    }
    $('archEmpty').hidden = visible.length > 0;
    const g = guests().length;
    $('archCount').textContent = `${marks()} / ${MAX_MARKS} picked` + (g ? ` · ${g} guest${g > 1 ? 's' : ''}` : '');
    renderBackupHint();
  }

  // single tap: toggle light/off · double tap: essential (dark)
  // five full: a tap turns the item into a guest instead (temporary, self-expiring)
  function attachTap(el, it) {
    let tapTimer = null;
    el.addEventListener('click', () => {
      if (tapTimer) {           // double tap
        clearTimeout(tapTimer);
        tapTimer = null;
        doubleTap(it, el);
      } else {
        tapTimer = setTimeout(() => {
          tapTimer = null;      // single tap
          singleTap(it, el);
        }, 260);
      }
    });
  }

  function singleTap(it, el) {
    if (it.priority) { it.priority = null; commit(); return; }
    if (isGuest(it)) { it.guest = null; commit(); return; }
    if (marks() < MAX_MARKS) { it.priority = 'light'; commit(); return; }
    tryGuest(it, el);
  }

  function doubleTap(it, el) {
    if (it.priority === 'dark') { it.priority = 'light'; commit(); return; }  // downgrade
    if (isGuest(it)) {
      // promote guest into the real five — only if a slot is free
      if (marks() < MAX_MARKS) { it.guest = null; it.priority = 'dark'; commit(); }
      else block(el, 'Five is five. Remove one first.');
      return;
    }
    if (it.priority === 'light' || marks() < MAX_MARKS) { it.priority = 'dark'; commit(); return; }
    tryGuest(it, el);
  }

  // a thought gets exactly one guest life — afterwards: into the five, or dump it anew
  function tryGuest(it, el) {
    if (it.guestUsed) {
      showModal('Five is five.',
        'This thought already had its guest life. Now it either joins the five (remove one first) or gets dumped again.',
        'Got it', null);
      return;
    }
    if (guests().length >= MAX_GUESTS) {
      showModal('All full.',
        `The five are full and all ${MAX_GUESTS} guest slots are taken. Let something go first.`,
        'Got it', null);
      return;
    }
    showModal('Five is five.',
      `Add it as a guest? A guest expires after ${GUEST_DAYS} days on its own and cannot be extended.`,
      'Add as guest',
      () => { it.guest = Date.now(); it.guestUsed = true; commit(); });
  }

  function showModal(title, text, okLabel, onOk) {
    $('modalTitle').textContent = title;
    $('modalText').textContent = text;
    const ok = $('modalOk');
    ok.textContent = okLabel;
    $('modalCancel').hidden = !onOk;
    $('modal').hidden = false;
    ok.onclick = () => { $('modal').hidden = true; if (onOk) onOk(); };
    $('modalCancel').onclick = () => { $('modal').hidden = true; };
  }

  function commit() { save(); renderArchive(); }

  // ---------- backup to file + restore ----------
  const BACKUP_KEY = 'braindump.lastBackup';
  function renderBackupHint() {
    const t = +localStorage.getItem(BACKUP_KEY) || 0;
    $('backupHint').textContent = t
      ? 'Last backup: ' + (Math.floor((Date.now() - t) / DAY) === 0 ? 'today' : Math.floor((Date.now() - t) / DAY) + ' d ago')
      : 'No backup yet.';
  }
  $('backupBtn').addEventListener('click', () => {
    const blob = new Blob(
      [JSON.stringify({ app: 'Brain Relieve', exported: new Date().toISOString(), items }, null, 2)],
      { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'brain-relieve-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    localStorage.setItem(BACKUP_KEY, Date.now() + '');
    renderBackupHint();
  });
  $('restoreBtn').addEventListener('click', () => $('restoreFile').click());
  $('restoreFile').addEventListener('change', e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    file.text().then(t => {
      const data = JSON.parse(t);
      const arr = Array.isArray(data) ? data : data.items;
      if (!Array.isArray(arr)) throw new Error('kein Array');
      const known = new Set(items.map(i => i.id));
      let n = 0;
      for (const it of arr) {
        if (it && it.id && typeof it.text === 'string' && !known.has(it.id)) {
          items.push({ id: it.id, text: it.text, created: +it.created || Date.now(),
            priority: it.priority === 'dark' || it.priority === 'light' ? it.priority : null,
            guest: +it.guest || null, guestUsed: !!it.guestUsed });
          n++;
        }
      }
      purgeReal();
      save();
      renderMain();
      renderArchive();
      $('backupHint').textContent = n + ' thoughts restored.';
    }).catch(() => { $('backupHint').textContent = "Can't read that file."; });
  });

  // ---------- letting go: delete anywhere, no friction, 5s undo ----------
  let lastDeleted = null, undoTimer;
  function doneBtn(it) {
    const b = document.createElement('button');
    b.className = 'donebtn';
    b.title = 'Done – delete';
    b.textContent = '✓';
    b.addEventListener('click', e => {
      e.stopPropagation();
      deleteItem(it);
    });
    return b;
  }
  function deleteItem(it) {
    const idx = items.indexOf(it);
    if (idx < 0) return;
    items.splice(idx, 1);
    lastDeleted = { it, idx };
    save();
    rerender();
    const t = $('undoToast');
    t.classList.add('show');
    clearTimeout(undoTimer);
    undoTimer = setTimeout(() => { t.classList.remove('show'); lastDeleted = null; }, 5000);
  }
  $('undoBtn').addEventListener('click', () => {
    if (lastDeleted) {
      items.splice(Math.min(lastDeleted.idx, items.length), 0, lastDeleted.it);
      save();
      lastDeleted = null;
      rerender();
    }
    $('undoToast').classList.remove('show');
    clearTimeout(undoTimer);
  });
  function rerender() {
    renderMain();
    if ($('archiveScreen').classList.contains('active')) renderArchive();
  }

  // ---------- long-press a five/guest card: offer to move it back to the archive ----------
  function attachLongPress(el, it) {
    let timer = null, sx = 0, sy = 0, fired = false;
    el.addEventListener('pointerdown', e => {
      sx = e.clientX; sy = e.clientY; fired = false;
      timer = setTimeout(() => {
        timer = null;
        fired = true;
        el._lpFired = true;
        const snippet = it.text.length > 40 ? it.text.slice(0, 40) + '…' : it.text;
        showModal('Back to the archive?',
          `"${snippet}" keeps its age and stays in the archive. You can pick it again anytime.`,
          'Move back',
          () => { it.priority = null; it.guest = null; save(); renderMain(); flash('Back in the archive.'); });
      }, 500);
    });
    const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
    el.addEventListener('pointermove', e => {
      if (timer && Math.hypot(e.clientX - sx, e.clientY - sy) > 10) cancel();
    });
    el.addEventListener('pointerup', cancel);
    el.addEventListener('pointercancel', cancel);
    el.addEventListener('contextmenu', e => e.preventDefault());
  }
  // after a long-press, the released tap must not flip the card's priority —
  // document-level capture runs before any card listener, guaranteed
  document.addEventListener('click', e => {
    const card = e.target.closest ? e.target.closest('.card') : null;
    if (card && card._lpFired) {
      card._lpFired = false;
      e.stopPropagation();
      e.preventDefault();
    }
  }, true);

  let limitTimer;
  function block(el, msg) {
    el.classList.add('blocked');
    setTimeout(() => el.classList.remove('blocked'), 450);
    const m = $('limitMsg');
    m.textContent = msg;
    m.classList.add('show');
    clearTimeout(limitTimer);
    limitTimer = setTimeout(() => m.classList.remove('show'), 2000);
  }

  $('closeBtn').addEventListener('click', () => {
    renderMain();
    show('mainScreen');
  });

  // real countdown: re-check the clock every minute and whenever the app comes back
  // to the foreground, so long-open sessions still fade and purge for real
  function tick() {
    const changed = purgeReal();
    renderMain();
    if (changed && $('archiveScreen').classList.contains('active')) renderArchive();
  }
  setInterval(tick, 60000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) tick(); });

  // ---------- boot ----------
  load();
  if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
  openMirror();
  // #import=<urlencoded JSON array> — hash never reaches the server, thoughts stay private
  if (location.hash.startsWith('#import=')) {
    try {
      const arr = JSON.parse(decodeURIComponent(location.hash.slice(8)));
      if (Array.isArray(arr)) {
        const texts = arr.filter(t => typeof t === 'string' && t.trim()).map(t => t.trim());
        if (texts.length) {
          addThoughts(texts);
          setTimeout(() => flash(`${texts.length} thoughts imported.`), 300);
        }
      }
    } catch (e) { /* malformed import — ignore */ }
    history.replaceState(null, '', location.pathname);
  }
  renderMain();
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js');
  }
})();
</script>
</body>
</html>
